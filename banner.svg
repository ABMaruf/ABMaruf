<svg width="1200" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1e3e;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#1a2d5e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a1f4e;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#1a3a5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2b4a;stop-opacity:1" />
    </linearGradient>

    <style>
      @keyframes titleGlow {
        0% { opacity: 0; filter: drop-shadow(0 0 2px rgba(0, 255, 200, 0.2)); }
        50% { opacity: 0.7; }
        100% { opacity: 1; filter: drop-shadow(0 0 15px rgba(0, 255, 200, 0.9)); }
      }
      @keyframes subtitleGlow {
        0% { opacity: 0; filter: drop-shadow(0 0 2px rgba(100, 220, 255, 0.2)); }
        60% { opacity: 0.8; }
        100% { opacity: 1; filter: drop-shadow(0 0 12px rgba(100, 220, 255, 0.7)); }
      }
      @keyframes pulseNode {
        0%, 100% { r: 6; fill-opacity: 0.9; }
        50% { r: 8; fill-opacity: 1; }
      }
      @keyframes flowLine {
        0% { stroke-dashoffset: 30; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes waveMotion {
        0% { transform: translateX(0); }
        100% { transform: translateX(60px); }
      }

      .node { animation: pulseNode 2s ease-in-out infinite; fill: #00ffcc; }
      .line { stroke: rgba(0, 220, 220, 0.4); stroke-dasharray: 15, 15; animation: flowLine 5s linear infinite; }
      .title-text { animation: titleGlow 3.5s ease-out forwards; font-family: Arial, sans-serif; font-size: 60px; font-weight: bold; fill: white; text-anchor: middle; }
      .subtitle-text { animation: subtitleGlow 4.5s ease-out forwards; font-family: Arial, sans-serif; font-size: 18px; fill: #00ffcc; text-anchor: middle; }
      .wave { animation: waveMotion 3s linear infinite; }
    </style>
  </defs>

  <rect width="1200" height="260" fill="url(#bgGradient)"/>

  <!-- Network edges -->
  <line class="line" stroke-width="1.2">
    <animate attributeName="x1" values="150;200;180;120;150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="80;120;50;70;80" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="350;380;320;320;350" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="100;70;130;120;100" dur="8s" repeatCount="indefinite"/>
  </line>

  <line class="line" stroke-width="1.2">
    <animate attributeName="x1" values="350;380;320;320;350" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="100;70;130;120;100" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="250;290;200;200;250" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="50;90;70;50;50" dur="8s" repeatCount="indefinite"/>
  </line>

  <line class="line" stroke-width="0.9">
    <animate attributeName="x1" values="250;290;200;200;250" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="50;90;70;50;50" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="150;200;180;120;150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="80;120;50;70;80" dur="8s" repeatCount="indefinite"/>
  </line>

  <line class="line" stroke-width="1.2">
    <animate attributeName="x1" values="550;600;520;480;550" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="y1" values="70;120;40;80;70" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="x2" values="700;750;720;680;700" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="y2" values="120;80;140;100;120" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
  </line>

  <line class="line" stroke-width="0.9">
    <animate attributeName="x1" values="700;750;720;680;700" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="y1" values="120;80;140;100;120" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="x2" values="550;600;520;480;550" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="y2" values="70;120;40;80;70" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
  </line>

  <line class="line" stroke-width="1.2">
    <animate attributeName="x1" values="950;1000;920;880;950" dur="9s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="y1" values="90;130;60;110;90" dur="9s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="x2" values="1080;1120;1050;1070;1080" dur="9s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="y2" values="140;100;130;70;140" dur="9s" repeatCount="indefinite" begin="1s"/>
  </line>

  <line class="line" stroke-width="0.9">
    <animate attributeName="x1" values="1080;1120;1050;1070;1080" dur="9s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="y1" values="140;100;130;70;140" dur="9s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="x2" values="950;1000;920;880;950" dur="9s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="y2" values="90;130;60;110;90" dur="9s" repeatCount="indefinite" begin="1s"/>
  </line>

  <line class="line" stroke-width="0.7">
    <animate attributeName="x1" values="350;380;320;320;350" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="100;70;130;120;100" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="550;600;520;480;550" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="70;120;40;80;70" dur="8s" repeatCount="indefinite"/>
  </line>

  <line class="line" stroke-width="0.7">
    <animate attributeName="x1" values="700;750;720;680;700" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="y1" values="120;80;140;100;120" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="x2" values="950;1000;920;880;950" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="y2" values="90;130;60;110;90" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
  </line>

  <!-- Network nodes -->
  <circle class="node">
    <animate attributeName="cx" values="150;200;180;120;150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;120;50;70;80" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle class="node">
    <animate attributeName="cx" values="350;380;320;320;350" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;70;130;120;100" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle class="node">
    <animate attributeName="cx" values="250;290;200;200;250" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;90;70;50;50" dur="8s" repeatCount="indefinite"/>
  </circle>

  <circle class="node">
    <animate attributeName="cx" values="550;600;520;480;550" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="70;120;40;80;70" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle class="node">
    <animate attributeName="cx" values="700;750;720;680;700" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="cy" values="120;80;140;100;120" dur="8.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <circle class="node">
    <animate attributeName="cx" values="950;1000;920;880;950" dur="9s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="90;130;60;110;90" dur="9s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle class="node">
    <animate attributeName="cx" values="1080;1120;1050;1070;1080" dur="9s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="cy" values="140;100;130;70;140" dur="9s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Title text -->
  <text x="600" y="140" class="title-text">AB MARUF</text>

  <!-- Subtitle text -->
  <text x="600" y="185" class="subtitle-text">Network Engineering • Cybersecurity • Real‑World Projects</text>

  <!-- Animated wave curves -->
  <path class="wave" d="M0,220 Q150,210 300,220 T600,220 T900,220 T1200,220 L1200,260 L0,260 Z" fill="rgba(0,255,204,0.15)" stroke="none"/>
  <path class="wave" d="M0,230 Q150,220 300,230 T600,230 T900,230 T1200,230 L1200,260 L0,260 Z" fill="rgba(0,200,255,0.1)" stroke="none" style="animation-delay: 0.5s"/>
</svg>