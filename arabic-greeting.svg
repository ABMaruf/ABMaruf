<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <style>
      @keyframes fadeInSlide {
        0% { opacity: 0; transform: translateX(-30px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes slideUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5)); }
        50% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.9)); }
      }
      .arabic-text { animation: fadeInSlide 2s ease-out forwards, glow 3s ease-in-out infinite 2s; }
      .subtitle { animation: slideUp 2.5s ease-out forwards, glow 3s ease-in-out infinite 2.5s; }
      .network-text { animation: slideUp 3s ease-out forwards 0.5s both; }
    </style>
  </defs>

  <!-- Black oval background -->
  <ellipse cx="200" cy="120" rx="180" ry="90" fill="rgba(0, 0, 0, 0.7)" stroke="rgba(255, 215, 0, 0.3)" stroke-width="2"/>

  <!-- Animated Arabic greeting: السلام عليكم (Golden & Black) -->
  <text x="200" y="100" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#FFD700" text-anchor="middle" class="arabic-text">
    السلام عليكم
  </text>

  <!-- Welcome text below -->
  <text x="200" y="145" font-family="'Courier New', monospace" font-size="14" fill="#FFD700" text-anchor="middle" class="subtitle">
    Peace be upon you
  </text>

  <!-- Network & Cybersecurity Enthusiast -->
  <text x="200" y="190" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#FFD700" text-anchor="middle" class="network-text">
    Network & Cybersecurity
  </text>

  <text x="200" y="215" font-family="'Courier New', monospace" font-size="18" font-weight="bold" fill="#FFD700" text-anchor="middle" class="network-text" style="animation-delay: 0.7s">
    Enthusiast
  </text>

  <!-- Building scalable systems -->
  <text x="200" y="250" font-family="'Courier New', monospace" font-size="13" fill="#FFD700" text-anchor="middle" class="network-text" style="animation-delay: 0.9s">
    Building scalable systems • Exploring networks
  </text>

  <text x="200" y="270" font-family="'Courier New', monospace" font-size="13" fill="#FFD700" text-anchor="middle" class="network-text" style="animation-delay: 1.1s">
    Securing the digital world
  </text>
</svg>