<svg width="350" height="280" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 280">
  <defs>
    <style>
      @keyframes slideIn {
        from { opacity: 0; } to { opacity: 1; }
      }
      .text1 { animation: slideIn 1s ease-out forwards; }
      .text2 { animation: slideIn 1.3s ease-out forwards; }
      .text3 { animation: slideIn 1.6s ease-out forwards; }
      .text4 { animation: slideIn 1.9s ease-out forwards; }
      .text5 { animation: slideIn 2.2s ease-out forwards; }
    </style>
  </defs>

  <!-- Black oval background -->
  <ellipse cx="175" cy="90" rx="150" ry="70" fill="rgba(0, 0, 0, 0.85)"/>

  <!-- Arabic Greeting: السلام عليكم -->
  <text x="175" y="100" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#FFD700" text-anchor="middle" class="text1">
    السلام عليكم
  </text>

  <!-- Peace be upon you -->
  <text x="175" y="130" font-family="Arial" font-size="12" fill="#FFD700" text-anchor="middle" class="text2">
    Peace be upon you
  </text>

  <!-- Network & Cybersecurity Enthusiast -->
  <text x="175" y="160" font-family="Arial" font-size="14" font-weight="bold" fill="#FFD700" text-anchor="middle" class="text3">
    Network & Cybersecurity
  </text>

  <text x="175" y="180" font-family="Arial" font-size="14" font-weight="bold" fill="#FFD700" text-anchor="middle" class="text3">
    Enthusiast
  </text>

  <!-- Building scalable systems -->
  <text x="175" y="210" font-family="Arial" font-size="11" fill="#FFD700" text-anchor="middle" class="text4">
    Building scalable systems • Exploring networks
  </text>

  <!-- Securing the digital world -->
  <text x="175" y="230" font-family="Arial" font-size="11" fill="#FFD700" text-anchor="middle" class="text5">
    Securing the digital world
  </text>
</svg>