<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <style>
      @keyframes fadeInSlide {
        0% { opacity: 0; transform: translateX(-30px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.5)) drop-shadow(0 0 2px rgba(0, 0, 0, 0.8)); }
        50% { filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.9)) drop-shadow(0 0 3px rgba(0, 0, 0, 1)); }
      }
      .arabic-text { animation: fadeInSlide 2s ease-out forwards, glow 3s ease-in-out infinite 2s; }
    </style>
  </defs>

  <!-- Animated Arabic greeting: السلام عليكم (Golden & Black) -->
  <text x="200" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFD700" text-anchor="middle" class="arabic-text">
    السلام عليكم
  </text>

  <!-- Welcome text below -->
  <text x="200" y="140" font-family="'Courier New', monospace" font-size="16" fill="#FFD700" text-anchor="middle" class="arabic-text" style="animation-delay: 0.5s">
    Peace be upon you
  </text>
</svg>
